services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: learning-center-app
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    volumes:
      - learning-center-app-html:/var/www/html
      - learning-center-storage:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php -r \"exit(@fsockopen('127.0.0.1', 9000) ? 0 : 1);\" && test -f /var/www/html/artisan"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - learning-center-net

  web:
    image: nginx:alpine
    container_name: learning-center-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:8086:80"
    volumes:
      - learning-center-app-html:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - learning-center-storage:/var/www/html/storage:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - learning-center-net

  db:
    image: mariadb:10.11
    container_name: learning-center-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-learning_center}
      MYSQL_USER: ${MYSQL_USER:-learning_center}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-learning_center_local_dev}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-learning_center_root_local_dev}
    volumes:
      - learning-center-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - learning-center-net

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: learning-center-scheduler
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    volumes:
      - learning-center-app-html:/var/www/html
      - learning-center-storage:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started
    networks:
      - learning-center-net
    entrypoint: ["docker/entrypoint.sh"]
    command: ["sh", "-c", "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"]

volumes:
  learning-center-app-html:
  learning-center-db-data:
  learning-center-storage:

networks:
  learning-center-net:
    name: learning-center-net
