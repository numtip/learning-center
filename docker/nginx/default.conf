# Internal edge for the learning-center stack.
#
# This vhost serves the Laravel app at document root (/).
# Production URL uses subpath /learning-center on the HOST reverse proxy.
# See docs/DEPLOYMENT_LEARNING_CENTER.md for proxy assumptions.

server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 64M;

    # Compose web healthcheck — independent of Laravel/DB
    location /healthz {
        access_log off;
        default_type text/plain;
        return 200 'ok';
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
